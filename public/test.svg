<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="100%" height="100%">
  <!-- Icon Group -->
  <g transform="translate(20, 0)">
    <!-- Solid Blue Medical Cross (Base & Left/Bottom Structure) -->
    <path d="M 50 85 h 35 v -35 h 15 v 50 h 50 v 15 h -35 v 35 h -30 v -35 h -35 z" fill="#1E3A8A" />

    <!-- Teal Neural Network / Data Synthesis Links -->
    <g stroke="#14B8A6" stroke-width="3.5" stroke-linecap="round">
      <!-- Inner mesh connecting into the cross negative space -->
      <line x1="100" y1="50" x2="115" y2="50" />
      <line x1="115" y1="50" x2="115" y2="85" />
      <line x1="115" y1="50" x2="132" y2="68" />
      <line x1="100" y1="70" x2="115" y2="85" />
      <line x1="100" y1="70" x2="132" y2="68" />
      <line x1="115" y1="85" x2="132" y2="68" />
      <line x1="115" y1="85" x2="150" y2="85" />
      <line x1="132" y1="68" x2="150" y2="85" />
      <line x1="150" y1="85" x2="150" y2="100" />
      <line x1="130" y1="100" x2="150" y2="85" />
      <line x1="130" y1="100" x2="132" y2="68" />
      <line x1="100" y1="100" x2="115" y2="85" />

      <!-- Outer expansion (subtle brain lobe / intelligence growth) -->
      <line x1="115" y1="50" x2="140" y2="40" />
      <line x1="132" y1="68" x2="140" y2="40" />
      <line x1="132" y1="68" x2="165" y2="60" />
      <line x1="150" y1="85" x2="165" y2="60" />
      <line x1="140" y1="40" x2="165" y2="60" />
    </g>

    <!-- Teal Data Points (Nodes) -->
    <g fill="#14B8A6">
      <!-- Outer Neural Nodes -->
      <circle cx="140" cy="40" r="5" />
      <circle cx="165" cy="60" r="5" />
      
      <!-- Inner Mesh Nodes -->
      <circle cx="115" cy="50" r="5" />
      <circle cx="115" cy="85" r="5" />
      <circle cx="132" cy="68" r="5" />
      <circle cx="150" cy="85" r="5" />
      
      <!-- Synthesis/Anchor Nodes bridging the blue edge -->
      <circle cx="100" cy="50" r="5" />
      <circle cx="100" cy="70" r="5" />
      <circle cx="100" cy="100" r="6.5" /> <!-- Core synthesis hub -->
      <circle cx="130" cy="100" r="5" />
      <circle cx="150" cy="100" r="5" />
    </g>
  </g>

  <!-- Typography -->
  <text x="230" y="122" font-family="'Plus Jakarta Sans', 'Inter', 'Montserrat', 'Segoe UI', system-ui, sans-serif" font-size="64" font-weight="800" letter-spacing="-1.5">
    <tspan fill="#1E3A8A">MedSyn</tspan><tspan fill="#14B8A6">IQ</tspan>
  </text>
</svg>
