<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Logo B: Neural Medical Cross — Icon only -->
  <g transform="translate(150,150)">
    <!-- Cross arms -->
    <rect x="-16" y="-80" width="32" height="160" rx="16" fill="#14b8a6" />
    <rect x="-80" y="-16" width="160" height="32" rx="16" fill="#14b8a6" />

    <!-- Neural dots at cross ends -->
    <circle cx="0" cy="-95" r="9" fill="#14b8a6" />
    <circle cx="0" cy="95" r="9" fill="#14b8a6" />
    <circle cx="-95" cy="0" r="9" fill="#14b8a6" />
    <circle cx="95" cy="0" r="9" fill="#14b8a6" />

    <!-- Diagonal neural lines -->
    <line x1="-58" y1="-58" x2="-28" y2="-28" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <line x1="58" y1="-58" x2="28" y2="-28" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <line x1="-58" y1="58" x2="-28" y2="28" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" opacity="0.5" />
    <line x1="58" y1="58" x2="28" y2="28" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" opacity="0.5" />

    <!-- Outer neural dots -->
    <circle cx="-68" cy="-68" r="6" fill="#14b8a6" opacity="0.4" />
    <circle cx="68" cy="-68" r="6" fill="#14b8a6" opacity="0.4" />
    <circle cx="-68" cy="68" r="6" fill="#14b8a6" opacity="0.4" />
    <circle cx="68" cy="68" r="6" fill="#14b8a6" opacity="0.4" />

    <!-- Inner neural dots -->
    <circle cx="-40" cy="-40" r="4.5" fill="#14b8a6" opacity="0.3" />
    <circle cx="40" cy="-40" r="4.5" fill="#14b8a6" opacity="0.3" />
    <circle cx="-40" cy="40" r="4.5" fill="#14b8a6" opacity="0.3" />
    <circle cx="40" cy="40" r="4.5" fill="#14b8a6" opacity="0.3" />
  </g>
</svg>
