<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <!-- Logo B: Neural Medical Cross — Icon only (bold version) -->
  <g transform="translate(150,150)">
    <!-- Outer circle frame -->
    <circle cx="0" cy="0" r="130" fill="none" stroke="#14b8a6" stroke-width="6" opacity="0.25" />

    <!-- Cross arms (thicker) -->
    <rect x="-20" y="-82" width="40" height="164" rx="20" fill="#14b8a6" />
    <rect x="-82" y="-20" width="164" height="40" rx="20" fill="#14b8a6" />

    <!-- Neural dots at cross ends (bigger) -->
    <circle cx="0" cy="-100" r="12" fill="#14b8a6" />
    <circle cx="0" cy="100" r="12" fill="#14b8a6" />
    <circle cx="-100" cy="0" r="12" fill="#14b8a6" />
    <circle cx="100" cy="0" r="12" fill="#14b8a6" />

    <!-- Diagonal neural lines (thicker) -->
    <line x1="-62" y1="-62" x2="-30" y2="-30" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.5" />
    <line x1="62" y1="-62" x2="30" y2="-30" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.5" />
    <line x1="-62" y1="62" x2="-30" y2="30" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.5" />
    <line x1="62" y1="62" x2="30" y2="30" stroke="#14b8a6" stroke-width="5" stroke-linecap="round" opacity="0.5" />

    <!-- Outer neural dots (bigger) -->
    <circle cx="-72" cy="-72" r="8" fill="#14b8a6" opacity="0.45" />
    <circle cx="72" cy="-72" r="8" fill="#14b8a6" opacity="0.45" />
    <circle cx="-72" cy="72" r="8" fill="#14b8a6" opacity="0.45" />
    <circle cx="72" cy="72" r="8" fill="#14b8a6" opacity="0.45" />

    <!-- Inner neural dots (bigger) -->
    <circle cx="-42" cy="-42" r="6" fill="#14b8a6" opacity="0.3" />
    <circle cx="42" cy="-42" r="6" fill="#14b8a6" opacity="0.3" />
    <circle cx="-42" cy="42" r="6" fill="#14b8a6" opacity="0.3" />
    <circle cx="42" cy="42" r="6" fill="#14b8a6" opacity="0.3" />
  </g>
</svg>
